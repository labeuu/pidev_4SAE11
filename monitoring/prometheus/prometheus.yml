###############################################################################
# Prometheus Configuration — Smart Freelance Platform
#
# All Spring Boot services expose metrics on management port 9090
# at /actuator/prometheus (separate from the main service port).
# This avoids any Spring Security conflicts on the main port.
#
# Scrape interval strategy:
#   - Gateway + core business services: 15s  (high visibility)
#   - Infrastructure (Eureka, Config):   30s  (low churn)
#   - All others:                        20s  (balanced)
###############################################################################

global:
  scrape_interval:     15s   # Default; overridden per-job below
  evaluation_interval: 15s   # How often to evaluate alerting rules
  scrape_timeout:      10s

  # Attach these labels to ALL time-series collected by this Prometheus.
  external_labels:
    environment: "docker-compose"
    platform:    "smart-freelance"

# ── Alerting rules ────────────────────────────────────────────────────────────
rule_files:
  - "alert-rules.yml"

# ── Alertmanager (uncomment when you deploy Alertmanager) ────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

###############################################################################
# Scrape Jobs
#
# Naming convention:  sf_<service-name>
# All metrics paths:  /actuator/prometheus  (Spring Boot Actuator default)
# All management ports: 9090 (management.server.port=9090 in each service)
###############################################################################

scrape_configs:

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: "prometheus"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # ══════════════════════════════════════════════════════════════════════════
  # Edge / Infrastructure
  # ══════════════════════════════════════════════════════════════════════════

  - job_name: "sf_api-gateway"
    scrape_interval: 15s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:9090"]
        labels:
          service:  "api-gateway"
          tier:     "edge"
          port:     "8078"

  - job_name: "sf_eureka"
    scrape_interval: 30s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["eureka:9090"]
        labels:
          service:  "eureka"
          tier:     "infrastructure"
          port:     "8420"

  - job_name: "sf_config-server"
    scrape_interval: 30s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["config-server:9090"]
        labels:
          service:  "config-server"
          tier:     "infrastructure"
          port:     "8888"

  - job_name: "sf_keycloak-auth"
    scrape_interval: 20s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["keycloak-auth:9090"]
        labels:
          service:  "keycloak-auth"
          tier:     "security"
          port:     "8079"

  # ══════════════════════════════════════════════════════════════════════════
  # Core Business Microservices  (highest priority — 15s scrape)
  # ══════════════════════════════════════════════════════════════════════════

  - job_name: "sf_user"
