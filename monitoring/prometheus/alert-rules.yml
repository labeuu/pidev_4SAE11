###############################################################################
# Prometheus Alerting Rules — Smart Freelance Platform
#
# Groups are evaluated every 15s (global evaluation_interval).
# Severity levels:  critical | warning | info
###############################################################################

groups:

  # ── Service Availability ──────────────────────────────────────────────────
  - name: service_availability
    rules:

      # Fire when a scrape target has been unreachable for 1 minute
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary:     "Service {{ $labels.job }} is DOWN"
          description: "{{ $labels.job }} (instance {{ $labels.instance }}) has been unreachable for more than 1 minute."

      # Warn when a service restarts unexpectedly (JVM uptime drops)
      - alert: ServiceRestarted
        expr: process_uptime_seconds < 60
        for: 0m
        labels:
          severity: warning
        annotations:
          summary:     "Service {{ $labels.application }} restarted"
          description: "{{ $labels.application }} has been running for less than 60 seconds — possible restart."

  # ── HTTP Performance ──────────────────────────────────────────────────────
  - name: http_performance
    rules:

      # P99 HTTP request latency > 2s for 5 minutes
      - alert: HighRequestLatency
        expr: >
          histogram_quantile(0.99,
            rate(http_server_requests_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "High P99 latency on {{ $labels.application }}"
          description: "P99 latency is {{ $value | humanizeDuration }} on service {{ $labels.application }} (uri={{ $labels.uri }})."

      # HTTP 5xx error rate > 5% over 5 minutes
      - alert: HighErrorRate
        expr: >
          rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          /
          rate(http_server_requests_seconds_count[5m])
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary:     "High 5xx error rate on {{ $labels.application }}"
          description: "{{ $value | humanizePercentage }} of requests to {{ $labels.application }} are returning 5xx errors."

      # Gateway-level high error rate (more sensitive)
      - alert: GatewayHighErrorRate
        expr: >
          rate(http_server_requests_seconds_count{application="apiGateway",status=~"5.."}[5m])
          /
          rate(http_server_requests_seconds_count{application="apiGateway"}[5m])
          > 0.02
        for: 2m
        labels:
          severity: critical
        annotations:
          summary:     "API Gateway 5xx rate exceeds 2%"
          description: "{{ $value | humanizePercentage }} of gateway requests are failing."

  # ── JVM Resources ─────────────────────────────────────────────────────────
  - name: jvm_resources
    rules:

      # Heap usage > 85% for 5 minutes
      - alert: HighHeapUsage
        expr: >
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "High JVM heap usage on {{ $labels.application }}"
          description: "Heap is {{ $value | humanizePercentage }} full on {{ $labels.application }} ({{ $labels.instance }})."

      # Heap usage > 95% for 2 minutes — imminent OOM
      - alert: CriticalHeapUsage
        expr: >
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary:     "Critical JVM heap usage on {{ $labels.application }} — OOM risk"
          description: "Heap is {{ $value | humanizePercentage }} full. OOM is imminent on {{ $labels.instance }}."

      # GC pause time > 500ms average over last 5 minutes
      - alert: HighGCPause
        expr: >
          rate(jvm_gc_pause_seconds_sum[5m])
          /
          rate(jvm_gc_pause_seconds_count[5m])
          > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "High GC pause time on {{ $labels.application }}"
          description: "Average GC pause is {{ $value | humanizeDuration }} on {{ $labels.application }}."

      # Thread count growing — possible thread leak
      - alert: ThreadCountGrowing
        expr: jvm_threads_live_threads > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary:     "Unusually high thread count on {{ $labels.application }}"
          description: "{{ $labels.application }} has {{ $value }} live threads."

  # ── Database Connection Pool ──────────────────────────────────────────────
  - name: db_pool
    rules:

      # HikariCP pool exhausted — all connections in use
      - alert: DBConnectionPoolExhausted
        expr: >
          hikaricp_connections_active
          /
          hikaricp_connections_max
          > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary:     "DB connection pool nearly exhausted on {{ $labels.application }}"
          description: "{{ $value | humanizePercentage }} of HikariCP connections are in use on {{ $labels.application }}."

      # Pending connection acquisitions > 0 for 5 minutes
      - alert: DBConnectionsPending
        expr: hikaricp_connections_pending > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary:     "DB connection requests pending on {{ $labels.application }}"
          description: "{{ $value }} threads waiting for a DB connection on {{ $labels.application }}."
