###############################################################################
# Smart Freelance Platform — Docker Compose
#
# Usage:
#   cp .env.example .env          # fill in secrets
#   docker-compose build          # build all images
#   docker-compose up -d          # start everything
#   docker-compose logs -f        # follow logs
#   docker-compose down -v        # stop + remove volumes
#
# Image naming convention (for Docker Hub push):
#   docker-compose push
#
# Startup order enforced via healthcheck conditions:
#   MySQL → Eureka → ConfigServer → Gateway/KeycloakAuth → Microservices → Frontend
###############################################################################

x-java-svc: &java-svc   # common settings for every Spring Boot service
  restart: unless-stopped
  networks: [sf-net]
  env_file: [.env]

# Merge this under each service's `environment:` — a service-level `environment` map replaces
# the anchor's keys from <<: *java-svc, so shared vars must be merged explicitly.
x-java-env: &java-env
  CONFIG_SERVER_URL: http://config-server:8888
  # Issuer must match the "iss" claim in JWTs. In Docker, Keycloak is configured with
  # KC_HOSTNAME=keycloak so tokens use http://keycloak:8080/realms/smart-freelance.
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/smart-freelance
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/smart-freelance/protocol/openid-connect/certs
  # Config Server templates (planning, task, gamification, etc.) use these placeholders — inside
  # containers localhost would NOT reach Keycloak; always point at the Docker service name.
  KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/smart-freelance
  KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/smart-freelance/protocol/openid-connect/certs
  # ── Monitoring: separate management port, no Spring Security involved ──────
  # Prometheus scrapes http://<service>:9090/actuator/prometheus from within sf-net.
  # Using a dedicated port means SecurityConfig on the main port is never touched.
  MANAGEMENT_SERVER_PORT: "9090"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics,env,loggers"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
  MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
  MANAGEMENT_METRICS_TAGS_PLATFORM: "smart-freelance"

x-java-depends: &java-depends  # wait for infra before starting any microservice
  depends_on:
    mysql:
      condition: service_healthy
    eureka:
      condition: service_healthy
    config-server:
      condition: service_healthy
    keycloak:
      condition: service_healthy

services:

  # ─────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    container_name: sf-mysql
    restart: unless-stopped
    networks: [sf-net]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Keycloak Identity Provider (v26.6.0 — no pre-baked credentials, create admin on first run)
  keycloak:
    build:
      context: .
      dockerfile: keycloak-start/Dockerfile
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/keycloak:${TAG:-latest}
    container_name: sf-keycloak
    restart: unless-stopped
    networks: [sf-net]
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://mysql:3306/keycloakdb
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/bin/bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  ollama:
    image: ollama/ollama:latest
    container_name: sf-ollama
    restart: unless-stopped
    networks: [sf-net]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama --version >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama-model-init:
    image: curlimages/curl:8.11.1
    container_name: sf-ollama-model-init
    restart: "no"
    networks: [sf-net]
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
    depends_on:
      ollama:
        condition: service_healthy
    # One argv block: Compose must not split a multiline string across entrypoint + command.
    command:
      - /bin/sh
      - -c
      - |
        set -e
        until curl -fsS http://ollama:11434/api/tags >/dev/null; do
          echo "Waiting for Ollama..."
          sleep 2
        done
        echo "Pulling model $${OLLAMA_MODEL}..."
        curl -fsS http://ollama:11434/api/pull \
          -H "Content-Type: application/json" \
          -d "{\"name\":\"$${OLLAMA_MODEL}\"}"

  # ─────────────────────────────────────────────────────────────────────────
  # Service Registry
  # ─────────────────────────────────────────────────────────────────────────

  eureka:
    build:
      context: ./backEnd/Eureka
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/eureka:${TAG:-latest}
    container_name: sf-eureka
    <<: *java-svc
    environment:
      <<: *java-env
      SERVER_PORT: 8420
    ports:
      - "8420:8420"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # Config Server
  # ─────────────────────────────────────────────────────────────────────────

  config-server:
    build:
      context: ./backEnd/ConfigServer
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/config-server:${TAG:-latest}
    container_name: sf-config
    <<: *java-svc
    environment:
      <<: *java-env
      SERVER_PORT: 8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
    depends_on:
      eureka:
        condition: service_healthy
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # API Gateway
  # ─────────────────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./backEnd/apiGateway
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/api-gateway:${TAG:-latest}
    container_name: sf-gateway
    <<: *java-svc
    environment:
      <<: *java-env
      SERVER_PORT: 8078
      SPRING_PROFILES_ACTIVE: docker     # activates application-docker.yml routes
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
    depends_on:
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-auth:
        condition: service_healthy
      user:
        condition: service_healthy
      project:
        condition: service_healthy
      offer:
        condition: service_healthy
      contract:
        condition: service_healthy
      review:
        condition: service_healthy
      planning:
        condition: service_healthy
      task:
        condition: service_healthy
    ports:
      - "8078:8078"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # Keycloak Auth Adapter (our custom Spring Boot service)
  # ─────────────────────────────────────────────────────────────────────────

  keycloak-auth:
    build:
      context: ./backEnd/KeyCloak
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/keycloak-auth:${TAG:-latest}
    container_name: sf-keycloak-auth
    <<: *java-svc
    environment:
      <<: *java-env
      SERVER_PORT: 8079
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: smart-freelance
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASS: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    depends_on:
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8079:8079"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8079'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 90s

  # ─────────────────────────────────────────────────────────────────────────
  # Microservices
  # ─────────────────────────────────────────────────────────────────────────

  user:
    build:
      context: ./backEnd/Microservices/user
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/user:${TAG:-latest}
    container_name: sf-user
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8090
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/userdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      KEYCLOAK_AUTH_SERVICE_URL: http://keycloak-auth:8079
    volumes:
      - user-uploads:/uploads/avatars
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8090'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  project:
    build:
      context: ./backEnd/Microservices/Project
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/project:${TAG:-latest}
    container_name: sf-project
    <<: [*java-svc, *java-depends]
    mem_limit: 768m
    environment:
      <<: *java-env
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/projectdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8084'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 150s

  offer:
    build:
      context: ./backEnd/Microservices/Offer
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/offer:${TAG:-latest}
    container_name: sf-offer
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8082
      SPRING_PROFILES_ACTIVE: docker          # activates application-docker.properties
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gestion_offre_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8082'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  contract:
    build:
      context: ./backEnd/Microservices/Contract
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/contract:${TAG:-latest}
    container_name: sf-contract
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gestion_contract_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8083'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  portfolio:
    build:
      context: ./backEnd/Microservices/Portfolio
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/portfolio:${TAG:-latest}
    container_name: sf-portfolio
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8086
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/portfolio_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      AI_API_KEY: ${AI_API_KEY:-}
    ports:
      - "8086:8086"

  review:
    build:
      context: ./backEnd/Microservices/review
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/review:${TAG:-latest}
    container_name: sf-review
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/reviewdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      NOTIFICATION_SERVICE_URL: http://notification:8087
      USER_SERVICE_URL: http://user:8090
      SPRING_MAIL_HOST: ${MAIL_HOST:-sandbox.smtp.mailtrap.io}
      SPRING_MAIL_PORT: ${MAIL_PORT:-2525}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8085'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  planning:
    build:
      context: ./backEnd/Microservices/planning
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/planning:${TAG:-latest}
    container_name: sf-planning
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8081
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888,optional:classpath:application-local.properties
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/planningdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/planning-service-account.json
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    volumes:
      - ${PLANNING_CALENDAR_CREDENTIALS:-./credentials/calendar-service-account.json}:/credentials/planning-service-account.json:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8081'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  task:
    build:
      context: ./backEnd/Microservices/task
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/task:${TAG:-latest}
    container_name: sf-task
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8091
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888,optional:classpath:application-local.properties
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      AIMODEL_SERVICE_URL: http://aimodel:8095
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8091:8091"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8091'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 120s

  ticket-service:
    build:
      context: ./backEnd/Microservices/ticket-service
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/ticket-service:${TAG:-latest}
    container_name: sf-ticket-service
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8096
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ticketdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/smart-freelance/protocol/openid-connect/certs
      NOTIFICATION_SERVICE_URL: http://notification:8087
      USER_SERVICE_BASE_URL: http://api-gateway:8078/user/api/users
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8096:8096"

  subcontracting:
    build:
      context: ./backEnd/Microservices/Subcontracting
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/subcontracting:${TAG:-latest}
    container_name: sf-subcontracting
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8110
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888,optional:classpath:application-local.properties
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gestion_subcontracting_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      SERVICE_USER_URL: http://user:8090
      SERVICE_PROJECT_URL: http://project:8084
      SERVICE_NOTIFICATION_URL: http://notification:8087
      # Media storage (videos / audio) — container-local writable directory
      APP_SUBCONTRACT_MEDIA_STORAGE_PATH: /tmp/subcontract-media
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8110:8110"

  notification:
    build:
      context: ./backEnd/Microservices/Notification
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/notification:${TAG:-latest}
    container_name: sf-notification
    <<: *java-svc
    environment:
      <<: *java-env
      SERVER_PORT: 8087
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      NOTIFICATION_FIREBASE_ENABLED: "true"
      GOOGLE_APPLICATION_CREDENTIALS: /firebase/firebase-credentials.json
    volumes:
      # Production: set FIREBASE_CREDENTIALS in .env to your service account JSON (host path).
      - ${FIREBASE_CREDENTIALS:-./firebase-credentials/firebase-credentials.json}:/firebase/firebase-credentials.json:ro
    depends_on:
      eureka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8087:8087"

  gamification:
    build:
      context: ./backEnd/Microservices/gamification
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/gamification:${TAG:-latest}
    container_name: sf-gamification
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gamificationdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8088:8088"

  chat:
    build:
      context: ./backEnd/Microservices/Chat
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/chat:${TAG:-latest}
    container_name: sf-chat
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8093
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/chatdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8093:8093"

  meeting:
    build:
      context: ./backEnd/Microservices/Meeting
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/meeting:${TAG:-latest}
    container_name: sf-meeting
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8101
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/meetingdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      GOOGLE_APPLICATION_CREDENTIALS: /credentials/meeting-service-account.json
    volumes:
      - ${MEETING_CALENDAR_CREDENTIALS:-./credentials/meeting-service-account.json}:/credentials/meeting-service-account.json:ro
    ports:
      - "8101:8101"

  aimodel:
    build:
      context: ./backEnd/Microservices/aimodel-node
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/aimodel:${TAG:-latest}
    container_name: sf-aimodel
    restart: unless-stopped
    networks: [sf-net]
    env_file: [.env]
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/smart-freelance
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/smart-freelance/protocol/openid-connect/certs
      PORT: 8095
      EUREKA_APP_NAME: AIMODEL
      EUREKA_CLIENT_SERVICE_URL: http://eureka:8420/eureka
      EUREKA_INSTANCE_HOSTNAME: aimodel
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
    depends_on:
      eureka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      ollama-model-init:
        condition: service_completed_successfully
    ports:
      - "8095:8095"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8095/actuator/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 45s

  freelancia-job:
    build:
      context: ./backEnd/Microservices/FreelanciaJob
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/freelancia-job:${TAG:-latest}
    container_name: sf-freelancia-job
    <<: [*java-svc, *java-depends]
    environment:
      <<: *java-env
      SERVER_PORT: 8097
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/freelancia_job_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8420/eureka
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
    ports:
      - "8097:8097"

  # ─────────────────────────────────────────────────────────────────────────
  # Monitoring Stack
  # ─────────────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sf-prometheus
    restart: unless-stopped
    networks: [sf-net]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d          # keep 15 days of data
      - --storage.tsdb.retention.size=5GB
      - --web.enable-lifecycle                      # POST /-/reload to hot-reload config
      - --web.enable-admin-api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    # No hard depends_on — Prometheus retries failed scrapes automatically.
    # Start it alongside the rest of the stack.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 15s

  grafana:
    image: grafana/grafana:10.4.2
    container_name: sf-grafana
    restart: unless-stopped
    networks: [sf-net]
    environment:
      # Admin credentials (override in .env for production)
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL:         http://localhost:3000
      # Auto-provision; no sign-up needed
      GF_USERS_ALLOW_SIGN_UP:     "false"
      # Persist dashboards and datasources across restarts
      GF_PATHS_PROVISIONING:      /etc/grafana/provisioning
      # Useful plugins (uncomment if needed)
      # GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend/smart-freelance-app
    image: ${DOCKER_HUB_USERNAME:-smartfreelance}/frontend:${TAG:-latest}
    container_name: sf-frontend
    restart: unless-stopped
    networks: [sf-net]
    depends_on:
      api-gateway:
        condition: service_healthy
    ports:
      - "4200:80"

# ─────────────────────────────────────────────────────────────────────────
# Networks & Volumes
# ─────────────────────────────────────────────────────────────────────────

networks:
  sf-net:
    name: smart-freelance-network
    driver: bridge

volumes:
  mysql-data:
    name: sf-mysql-data
  user-uploads:
    name: sf-user-uploads
  ollama-data:
    name: sf-ollama-data
  prometheus-data:
    name: sf-prometheus-data
  grafana-data:
    name: sf-grafana-data
