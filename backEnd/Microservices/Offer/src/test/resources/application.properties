# Tests: pas de Config Server / Eureka ; H2 en mémoire (aligné fork + base) ; mail désactivé
spring.cloud.config.enabled=false
spring.config.import=
eureka.client.enabled=false

spring.datasource.url=jdbc:h2:mem:offer-test-db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

welcome.message=Offer microservice (test)
app.mail.from=test@example.local
app.mail.enabled=false
spring.mail.host=localhost
management.health.mail.enabled=false
