# Docker profile — overrides localhost values from application.properties / Config Server.
# Activated when SPRING_PROFILES_ACTIVE=docker (set in docker-compose).

# Point to Config Server container (overrides localhost:8888 in application.properties)
spring.config.import=optional:configserver:http://config-server:8888

# Database (overrides localhost from Config Server's OFFER.properties)
spring.datasource.url=jdbc:mysql://mysql:3306/gestion_offre_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:rootpassword}

# Eureka
eureka.client.service-url.defaultZone=http://eureka:8420/eureka

# Keycloak JWT (overrides localhost:9090 from OFFER.properties)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/smart-freelance
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/smart-freelance/protocol/openid-connect/certs
