# ──────────────────────────────────────────────────────────────────────────────
# FreelanciaJob – test profile
# Replaces MySQL with H2 and disables all external services
# ──────────────────────────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:freelanciajobtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Cloud Config Server
spring.config.import=optional:

# Disable Eureka
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable Feign circuit breaker
spring.cloud.openfeign.circuitbreaker.enabled=false

# Disable mail auto-configuration (no SMTP in tests)
spring.mail.host=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# File storage - point to a temp dir during tests
app.upload.dir=/tmp/freelancia-test-uploads
