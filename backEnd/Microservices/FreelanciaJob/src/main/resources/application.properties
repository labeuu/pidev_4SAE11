spring.application.name=FreelanciaJob
server.port=${SERVER_PORT:8097}

# Feign circuit breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8420/eureka/}
eureka.instance.prefer-ip-address=true

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/freelancia_job_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Config Server client
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888},optional:classpath:application-local.properties

# Actuator refresh endpoint
management.endpoints.web.exposure.include=refresh,health,info

# AI Job Generator
ai.api.url=${AI_API_URL:https://api.apifree.ai/v1/chat/completions}
ai.api.model=${AI_API_MODEL:openai/gpt-5.2}
ai.api.key=${API_KEY:}

# Notification microservice (in-app alerts). Default port from Notification service; override if needed.
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8098}

# ─── File Upload ─────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=55MB
# Physical storage root (relative to working dir; override via env var)
app.upload.base-dir=${UPLOAD_DIR:uploads}

# ─── SMTP / Gmail ────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:iheb.ayed@gmail.com}
# Set MAIL_PASSWORD env var to your Gmail App Password (never commit the real value)
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
# Display name shown in the "From" header
app.mail.from-name=Freelancia Platform


