spring.application.name=FreelanciaJob
server.port=${SERVER_PORT:8095}

# Feign circuit breaker
spring.cloud.openfeign.circuitbreaker.enabled=true

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8420/eureka/}
eureka.instance.prefer-ip-address=true

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/freelancia_job_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Config Server client
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Actuator refresh endpoint
management.endpoints.web.exposure.include=refresh,health,info
