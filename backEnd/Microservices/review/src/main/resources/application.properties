spring.application.name=review
server.port=8085
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true

welcome.message=Welcome to review microservice (local config)

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/reviewdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# Use update to avoid noisy drop errors when tables or FKs don't yet exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Make Swagger UI more convenient for testing
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.tryItOutEnabled=true

# Config Server client + local overrides (application-local.properties is gitignored)
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888,optional:classpath:application-local.properties

# Actuator refresh endpoint exposure (disable mail health to avoid failures when mail is optional)
management.endpoints.web.exposure.include=refresh
management.health.mail.enabled=false

# Notification microservice (for sending notifications when review responses are received)
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8087}

# User microservice (for fetching reviewee email when sending review response emails)
user.service.url=${USER_SERVICE_URL:http://localhost:8090}

# Mailtrap SMTP (sandbox for testing emails when user receives a review message)
# Get credentials from: mailtrap.io → Sandboxes → My Sandbox → Integration → SMTP
spring.mail.host=${MAILTRAP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAILTRAP_PORT:2525}
spring.mail.username=${MAILTRAP_USERNAME:}
spring.mail.password=${MAILTRAP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Mail sender config (from address; Mailtrap accepts any)
app.mail.from=${APP_MAIL_FROM:noreply@smart-freelance.local}
app.mail.enabled=${APP_MAIL_ENABLED:true}