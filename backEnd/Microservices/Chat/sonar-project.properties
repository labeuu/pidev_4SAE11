# SonarQube project properties for Chat microservice
# Run: mvnw clean verify sonar:sonar -Dsonar.token=YOUR_TOKEN
sonar.projectKey=chat
sonar.projectName=Chat
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.exclusions=**/target/**/*,**/generated/**/*
sonar.coverage.exclusions=**/entity/**,**/dto/**,**/*Application.java
