spring.application.name=gamification
server.port=8088

# Notification microservice (direct; gateway path is /notification/**)
notification.service.url=http://localhost:8098
spring.cloud.openfeign.circuitbreaker.enabled=false

welcome.message=Welcome to Gamification microservice (local config)

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8420/eureka/
eureka.instance.prefer-ip-address=true

# Dedicated schema (tables moved out of projectdb)
spring.datasource.url=jdbc:mysql://localhost:3306/gamificationdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

management.endpoints.web.exposure.include=refresh,health

# Keycloak JWT — iss claim must match exactly (see KeyCloak keycloak.auth-server-url + realm).
# Override if your Keycloak runs elsewhere: KEYCLOAK_ISSUER_URI / KEYCLOAK_JWKS_URI
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/smart-freelance}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/smart-freelance/protocol/openid-connect/certs}
