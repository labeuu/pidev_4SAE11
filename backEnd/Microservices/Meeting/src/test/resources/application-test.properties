# ──────────────────────────────────────────────────────────────────────────────
# Test profile: replaces MySQL with in-memory H2 and disables all external
# services (Eureka, Config Server, Google Calendar).
# ──────────────────────────────────────────────────────────────────────────────

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:meetingtest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Spring Cloud Config Server import
spring.config.import=optional:

# Disable Eureka discovery
spring.cloud.discovery.enabled=false
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# Disable Google Calendar integration
google.calendar.enabled=false

# Disable Feign circuit breaker for tests
spring.cloud.openfeign.circuitbreaker.enabled=false
