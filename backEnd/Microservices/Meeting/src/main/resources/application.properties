spring.application.name=meeting
# Must match apiGateway GATEWAY_MEETING_URI (default 8101); docker-compose sets SERVER_PORT=8101
server.port=${SERVER_PORT:8101}

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/meetingdb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8420/eureka/}
eureka.instance.prefer-ip-address=true

# Config Server (optional)
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Feign / Resilience4j
feign.circuitbreaker.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true
# Without Eureka, enable profile "local" so Feign can reach Project (8084) and Contract (8083); see application-local.properties.

# Google Calendar + Meet
# Set google.calendar.enabled=true and supply credentials-path (or GOOGLE_APPLICATION_CREDENTIALS env)
# The service account must have Google Workspace delegation to impersonate a calendar owner,
# OR you can use a shared service-account calendar.
google.calendar.enabled=true
google.calendar.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:/Users/macbook/pidev_4SAE11/credentials/meeting-service-account.json}
google.calendar.default-calendar-id=${GOOGLE_CALENDAR_ID:f83c84497212d5009500f4c2c784a747c35a071be1bd3629485d19e765f84fbb@group.calendar.google.com}
google.calendar.timezone=${GOOGLE_CALENDAR_TIMEZONE:Africa/Tunis}

# Spring AI – Ollama (shared instance, same model as AImodel microservice)
spring.ai.model.chat=ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:gemma3:4b}
spring.ai.ollama.chat.options.temperature=0.3
spring.ai.ollama.chat.options.keep-alive=15m

# Actuator
management.endpoints.web.exposure.include=health,info
