# Tests: do not require Config Server (overrides main bootstrap import)
spring.application.name=planning
spring.config.import=optional:configserver:http://127.0.0.1:65534
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

welcome.message=Welcome to Planning API

server.port=8081
eureka.client.enabled=false
eureka.client.register-with-eureka=false

# In-memory DB for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration,org.springdoc.core.configuration.SpringDocHateoasConfiguration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=false

management.endpoints.web.exposure.include=refresh,health
management.health.db.enabled=true

task.service.url=http://localhost:8091
project.service.url=http://localhost:8084

# Feign clients without explicit URLs in annotations — point to fixed hosts when Eureka is off in tests
spring.cloud.openfeign.client.config.USER.url=http://127.0.0.1:8090
spring.cloud.openfeign.client.config.notification.url=http://127.0.0.1:8098

github.enabled=false
github.token=
github.token-file=

google.calendar.enabled=false
google.calendar.credentials-path=
google.calendar.default-calendar-id=primary

planning.scheduler.overdue-cron=0 0 * * * ?
planning.scheduler.cleanup-cron=0 0 3 ? * SUN
