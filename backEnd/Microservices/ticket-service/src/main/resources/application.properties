spring.application.name=ticket
server.port=8093

eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
eureka.instance.preferIpAddress=false

welcome.message=Welcome to ticket microservice (local config)

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ticketdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Config Server client
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

# Actuator refresh endpoint exposure
management.endpoints.web.exposure.include=refresh,health

# Keycloak JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/smart-freelance}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/smart-freelance/protocol/openid-connect/certs}

# External dependencies
app.user-service.base-url=${USER_SERVICE_BASE_URL:http://localhost:8078/user/api/users}
app.moderation.base-url=${MODERATION_BASE_URL:https://www.purgomalum.com/service}
app.ticket.auto-close-after-hours=48
app.ticket.auto-close-cron=${TICKET_AUTOCLOSE_CRON:0 */15 * * * *}
