# Tests: do not require Config Server (overrides main bootstrap import)
spring.application.name=task
spring.config.import=optional:configserver:http://127.0.0.1:65534
spring.cloud.config.enabled=false

server.port=8091
eureka.client.enabled=false
eureka.client.register-with-eureka=false

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.cloud.openfeign.client.config.planning.url=http://127.0.0.1:8081
spring.cloud.openfeign.client.config.Project.url=http://127.0.0.1:8084
spring.cloud.openfeign.client.config.Contract.url=http://127.0.0.1:8083
spring.cloud.openfeign.client.config.user.url=http://127.0.0.1:8090
spring.cloud.openfeign.client.config.notification.url=http://127.0.0.1:8098

server.tomcat.connection-timeout=14400000
spring.cloud.openfeign.client.config.AIMODEL.url=http://127.0.0.1:8095
spring.cloud.openfeign.client.config.AIMODEL.connect-timeout=30000
spring.cloud.openfeign.client.config.AIMODEL.read-timeout=14400000
spring.cloud.openfeign.client.config.aimodelAiClient.connect-timeout=30000
spring.cloud.openfeign.client.config.aimodelAiClient.read-timeout=14400000

task.scheduler.escalate-cron=0 0 9 * * ?
task.scheduler.purge-cron=0 0 4 ? * MON
task.scheduler.overdue-reminder-cron=0 0 8 * * ?
task.scheduler.purge-cancelled-days=90
