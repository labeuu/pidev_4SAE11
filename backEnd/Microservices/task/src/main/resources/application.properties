spring.application.name=task
server.port=8091

# Local defaults so the app starts when Config Server is unavailable.
# When http://localhost:8888 is up, Config Server properties override these.
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=task:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

spring.datasource.url=jdbc:mysql://localhost:3306/taskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=15000&socketTimeout=15000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Config Server client (centralized overrides when the server is running)
spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

# ── Monitoring / Prometheus ──────────────────────────────────────────────────
# In Docker: management.server.port is set to 9090 via MANAGEMENT_SERVER_PORT env var
# (see docker-compose.yml x-java-env) — metrics are served on port 9090, separate
# from the main port, bypassing Spring Security entirely.
# Locally: metrics served on the main service port.
management.endpoints.web.exposure.include=health,info,prometheus,metrics,env,loggers,refresh
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration
