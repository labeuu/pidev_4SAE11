# Bootstrap Task: configuration principale dans Config Server (task.properties).
# 1) Demarrer Eureka (8420) puis Config Server (8888), puis ce microservice.
# 2) Surcharges locales (mots de passe, cles): application-local.properties (gitignore)

spring.application.name=task
spring.config.import=configserver:http://localhost:8888,optional:classpath:application-local.properties
