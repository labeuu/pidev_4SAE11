spring.application.name=task
server.port=8091
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true

welcome.message=Welcome to task microservice (local config)

spring.datasource.url=jdbc:mysql://localhost:3307/taskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=15000&socketTimeout=15000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration,org.springdoc.core.configuration.SpringDocHateoasConfiguration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

spring.cloud.config.enabled=true
spring.config.import=optional:configserver:http://localhost:8888

management.endpoints.web.exposure.include=refresh,health,prometheus

# Keep servlet HTTP connection open while Feign waits on slow Ollama (ms).
server.tomcat.connection-timeout=14400000

aimodel.service.url=http://localhost:8092
# Feign → AImodel: long read for slow local LLM (ms). Request.Options in AImodelFeignConfiguration is authoritative.
spring.cloud.openfeign.client.config.AIMODEL.connect-timeout=30000
spring.cloud.openfeign.client.config.AIMODEL.read-timeout=14400000
spring.cloud.openfeign.client.config.aimodelAiClient.connect-timeout=30000
spring.cloud.openfeign.client.config.aimodelAiClient.read-timeout=14400000

# Scheduled jobs (cron: second minute hour day month weekday)
task.scheduler.escalate-cron=0 0 9 * * ?
task.scheduler.purge-cron=0 0 4 ? * MON
task.scheduler.overdue-reminder-cron=0 0 8 * * ?
task.scheduler.purge-cancelled-days=90
