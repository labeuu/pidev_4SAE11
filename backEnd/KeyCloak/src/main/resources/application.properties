spring.application.name=keycloak-auth
server.port=8079

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true

# Keycloak server (run Keycloak separately - see README; must be Keycloak's URL, not this service's port)
# NOTE: The API Gateway is already configured to validate tokens against
# http://localhost:8421/realms/smart-freelance, so we point the auth service
# to the same Keycloak base URL to avoid mismatched hosts/ports.
keycloak.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
keycloak.realm=${KEYCLOAK_REALM:smart-freelance}
keycloak.resource=${KEYCLOAK_RESOURCE:smart-freelance-backend}
keycloak.credentials.secret=${KEYCLOAK_CLIENT_SECRET:PpZuiHLBeLfl3xsxaQsmBDjT9nYgfoJE}

# Keycloak Admin API (for user registration). If admin-cli has "Client authentication" ON, set client-secret.
keycloak.admin.realm=master
keycloak.admin.client-id=admin-cli
keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:Vpa9TwXFx82VRyID7xTYsn6w8dhkNSE6}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:${KEYCLOAK_ADMIN:admin}}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:${KEYCLOAK_ADMIN_PASS:admin}}

# Service-to-service secret (same value must be set in User microservice for sync delete/update)
keycloak.service-secret=${KEYCLOAK_SERVICE_SECRET:smart-freelance-internal-secret}

# OAuth2 Resource Server: validate JWT from Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/certs

# Actuator / Monitoring / Prometheus
# In Docker: management.server.port is set to 9090 via MANAGEMENT_SERVER_PORT env var
# (see docker-compose.yml x-java-env) — metrics are served on port 9090, separate
# from the main port, bypassing Spring Security entirely.
# Locally: metrics served on the main service port.
management.endpoints.web.exposure.include=health,info,prometheus,metrics,env,loggers,refresh
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.security.servlet.ManagementWebSecurityAutoConfiguration

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
