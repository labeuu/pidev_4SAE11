spring.application.name=AIMODEL
server.port=8095

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
eureka.instance.preferIpAddress=false

# Actuator
management.endpoints.web.exposure.include=health,info

# AI provider
spring.ai.model.chat=ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
spring.ai.ollama.chat.options.model=${OLLAMA_MODEL:gemma3:4b}
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.keep-alive=15m

# Health-check timeouts for provider status endpoint
aimodel.status.connect-timeout-ms=5000
aimodel.status.read-timeout-ms=5000
