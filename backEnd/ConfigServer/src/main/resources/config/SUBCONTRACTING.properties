# =============================================================================
# SUBCONTRACTING microservice — configuration centralisée (Config Server)
# =============================================================================

spring.application.name=SUBCONTRACTING
server.port=8110

welcome.message=Bienvenue sur le microservice Subcontracting (Config Server)

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=SUBCONTRACTING:8110
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_subcontracting_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Feign
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=full
feign.circuitbreaker.enabled=true

service.user.url=http://localhost:8090
service.project.url=http://localhost:8084
service.offer.url=http://localhost:8082
service.contract.url=http://localhost:8083
service.notification.url=http://localhost:8087
service.portfolio.url=http://localhost:8086

# Anthropic Claude (matching sous-traitance)
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.api.model=${ANTHROPIC_MODEL:claude-3-5-haiku-20241022}
anthropic.api.url=https://api.anthropic.com/v1/messages

# Spring Mail (même schéma que OFFER — Gmail / Mailtrap / etc.)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.test-connection=false
app.mail.from=${MAIL_FROM:noreply@smart-freelance.local}
app.mail.enabled=${MAIL_ENABLED:true}
app.mail.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}

# Fichiers média (MP4 / MP3) — URL publique pour liens e-mail
app.subcontract.media.storage-path=${SUBCONTRACT_MEDIA_PATH:./data/subcontract-media}
app.subcontract.media.download-base-url=${SUBCONTRACT_MEDIA_PUBLIC_URL:http://localhost:8110}

spring.servlet.multipart.max-file-size=120MB
spring.servlet.multipart.max-request-size=120MB

# Resilience4j
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=10000

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=refresh,health,info
management.health.mail.enabled=false

logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.org.example.subcontracting.service=DEBUG

# Coaching IA — wallet points (freemium)
coach.wallet.low-balance-threshold=300
coach.wallet.critical-balance-threshold=0
coach.wallet.welcome-bonus-points=2000
# coach.wallet.admin-notify-user-ids=1,2,3
