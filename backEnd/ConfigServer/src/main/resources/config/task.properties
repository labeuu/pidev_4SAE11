spring.application.name=task
server.port=8091

welcome.message=Welcome to task microservice (from Config Server)

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=task:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

spring.datasource.url=jdbc:mysql://localhost:3306/taskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&connectTimeout=15000&socketTimeout=15000
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration,org.springdoc.core.configuration.SpringDocHateoasConfiguration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=refresh,health,prometheus

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/smart-freelance}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/smart-freelance/protocol/openid-connect/certs}

task.scheduler.escalate-cron=0 0 9 * * ?
task.scheduler.purge-cron=0 0 4 ? * MON
task.scheduler.overdue-reminder-cron=0 0 8 * * ?
task.scheduler.purge-cancelled-days=90

# Priority escalation policy (scheduler: task.scheduler.escalate-cron). Days are calendar days.
# 0 = disabled for optional rules. Base rule always bumps overdue LOW/MEDIUM root tasks to HIGH.
task.escalation.high-to-urgent-overdue-days=0
task.escalation.stuck-in-review-days=0
task.escalation.notify-client-on-escalation=false

# Inter-service calls use Eureka load balancing via service IDs:
# Project -> spring.application.name=Project
# planning -> spring.application.name=planning
# Contract -> spring.application.name=Contract
# user -> spring.application.name=user
# notification -> spring.application.name=notification
# AIMODEL -> spring.application.name=AIMODEL

# Planning MS (progress updates) — used by AI client brief orchestration in Task MS
# When true, task/subtask status changes (assigned work) create a Planning progress update
task.planning.auto-progress-on-status-change=true
server.tomcat.connection-timeout=14400000
spring.cloud.openfeign.client.config.AIMODEL.connect-timeout=30000
spring.cloud.openfeign.client.config.AIMODEL.read-timeout=14400000
spring.cloud.openfeign.client.config.aimodelAiClient.connect-timeout=30000
spring.cloud.openfeign.client.config.aimodelAiClient.read-timeout=14400000
