spring.application.name=ticket
server.port=8094

eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.hostname=localhost
eureka.instance.preferIpAddress=false

welcome.message=Welcome to ticket microservice (from Config Server)

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ticketdb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Actuator refresh endpoint exposure
management.endpoints.web.exposure.include=refresh,health

# Keycloak JWT — use the SAME host:port as keycloak.auth-server-url in KeyCloak/application.properties.
# Wrong JWKS URL -> signature check fails -> 401 on every ticket API.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI:http://localhost:8080/realms/smart-freelance/protocol/openid-connect/certs}

# Notification microservice (Feign)
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:8098}
# Optional Keycloak user id (numeric) to receive "user replied" / extra "reopened" alerts for the support inbox
app.ticket.support-inbox-user-id=${TICKET_SUPPORT_INBOX_USER_ID:}

# External dependencies
app.user-service.base-url=${USER_SERVICE_BASE_URL:http://localhost:8078/user/api/users}
# PurgoMalum: GET {base}/plain?text=... returns censored plain text (see https://www.purgomalum.com).
app.moderation.base-url=${MODERATION_BASE_URL:https://www.purgomalum.com/service}
app.moderation.enabled=${MODERATION_ENABLED:true}
app.moderation.reject-on-profanity=${MODERATION_REJECT_PROFANITY:true}
app.ticket.auto-close-after-hours=48
app.ticket.auto-close-cron=${TICKET_AUTOCLOSE_CRON:0 */15 * * * *}
