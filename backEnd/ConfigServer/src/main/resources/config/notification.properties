spring.application.name=notification
server.port=8098

welcome.message=Welcome to notification microservice (from Config Server)

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true

# Firebase: Firestore when true. Place *firebase-adminsdk*.json under repo firebase-credentials/ or set GOOGLE_APPLICATION_CREDENTIALS.
# Set notification.firebase.enabled=false if you have no credentials (in-memory store).
notification.firebase.enabled=true
notification.firebase.credentials-path=${GOOGLE_APPLICATION_CREDENTIALS:}

# Swagger / OpenAPI
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration,org.springdoc.core.configuration.SpringDocHateoasConfiguration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator
management.endpoints.web.exposure.include=refresh,health
