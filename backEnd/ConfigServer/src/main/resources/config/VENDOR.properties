# =============================================================================
# VENDOR microservice — configuration centralisée (Config Server)
# Surcharges locales : application-local.properties dans le microservice Vendor
# =============================================================================

spring.application.name=VENDOR
server.port=8093

welcome.message=Bienvenue sur le microservice Vendor (Config Server)

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=VENDOR:${server.port}
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_vendor_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Feign
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
feign.client.config.default.loggerLevel=full
feign.circuitbreaker.enabled=true

service.user.url=http://localhost:8090
service.offer.url=http://localhost:8082
service.review.url=http://localhost:8085
service.project.url=http://localhost:8084

# Resilience4j
resilience4j.circuitbreaker.instances.userService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userService.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.userService.permittedNumberOfCallsInHalfOpenState=3

resilience4j.circuitbreaker.instances.notification.slidingWindowSize=10
resilience4j.circuitbreaker.instances.notification.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notification.waitDurationInOpenState=10000
resilience4j.circuitbreaker.instances.notification.permittedNumberOfCallsInHalfOpenState=3

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=refresh,health,info

logging.level.org.springframework.cloud.openfeign=DEBUG
logging.level.com.netflix.discovery=INFO
logging.level.org.example.vendor.service=DEBUG
