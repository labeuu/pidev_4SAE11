# ========== Gateway routes (dynamic: targets resolved via Eureka) ==========
# Each route: /<prefix>/** -> lb://<service-id> with first path segment stripped.
# Service instances are resolved at runtime from Eureka. Add a new route block
# for any new microservice (same pattern: id, uri lb://<eureka-service-id>, Path, StripPrefix=1).
spring:
  # Allow large JSON bodies (e.g. Base64 signature images) through the reactive gateway
  codec:
    max-in-memory-size: 10MB
  cloud:
    gateway:
      # Global Netty timeouts (Duration for response; ms for connect). Very long for slow local LLM (Task→AImodel→Ollama).
      httpclient:
        response-timeout: 4h
        connect-timeout: 30000
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
              - "http://127.0.0.1:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - Authorization
              - Content-Type
              - Accept
              - Origin
              - X-Requested-With
              - X-User-Id
              - Sec-WebSocket-Key
              - Sec-WebSocket-Version
              - Sec-WebSocket-Protocol
              - Sec-WebSocket-Extensions
            exposedHeaders:
              - Content-Disposition
              - Content-Type
            allowCredentials: true
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      routes:
        - id: keycloak-auth
          uri: http://localhost:8079
          predicates:
            - Path=/keycloak-auth/**
          filters:
            - StripPrefix=1

        - id: user
          uri: http://localhost:8090
          predicates:
            - Path=/user/**
          filters:
            - StripPrefix=1

        # Portfolio: URL directe (port 8086) — évite 503 « Unable to find instance for PORTFOLIO »
        # si Eureka n’est pas démarré ou si le service n’est pas enregistré.
        - id: portfolio
          uri: http://localhost:8086
          predicates:
            - Path=/portfolio/**
          filters:
            - StripPrefix=1
          metadata:
            response-timeout: 120000
            connect-timeout: 10000


        # Planning: direct URL (no Eureka), port 8081 - ensure Planning microservice is running
        - id: planning
          uri: http://localhost:8081
          predicates:
            - Path=/planning/**
          filters:
            - StripPrefix=1
            - SetRequestHeader=X-Internal-Gateway,true
          metadata:
            response-timeout: 30000
            connect-timeout: 5000

        # Review: direct URL so it works without Eureka (service runs on 8085)
        - id: review
          uri: http://localhost:8085
          predicates:
            - Path=/review/**
          filters:
            - StripPrefix=1

        # Project: direct URL so requests always hit the Project microservice (port 8084)
        - id: project
          uri: http://localhost:8084
          predicates:
            - Path=/project/**
          filters:
            - StripPrefix=1

        # Gamification: achievements, levels, XP (port 8088)
        - id: gamification
          uri: http://localhost:8088
          predicates:
            - Path=/gamification/**
          filters:
            - StripPrefix=1

        # Offer (local IntelliJ default port 8082; use lb://OFFER if you prefer Eureka-only)
        - id: offer
          uri: http://localhost:8082
          predicates:
            - Path=/offer/**
          filters:
            - StripPrefix=1

        - id: contract
          uri: http://localhost:8083
          predicates:
            - Path=/contract/**
          filters:
            - StripPrefix=1

        # Notification (Firestore): direct URL (port 8087)
        - id: notification
          uri: http://localhost:8087
          predicates:
            - Path=/notification/**
          filters:
            - StripPrefix=1

        # Ticket: support tickets (must match ticket-service server.port)
        - id: ticket
          uri: http://localhost:8094
          predicates:
            - Path=/ticket/**
          filters:
            - StripPrefix=1

        # Subcontracting Management (port 8110)
        - id: subcontracting
          uri: http://localhost:8110
          predicates:
            - Path=/subcontracting/**
          filters:
            - StripPrefix=1

        # Freelancia Job — direct URL for local IntelliJ (avoids 502 when Eureka advertises a LAN IP Netty can't use).
        # Docker: use application-docker.yml (service hostnames). Override: GATEWAY_FREELANCIA_JOB_URI
        - id: freelancia-job
          uri: ${GATEWAY_FREELANCIA_JOB_URI:http://127.0.0.1:8097}
          predicates:
            - Path=/freelancia-job/**
          filters:
            - StripPrefix=1

        - id: meeting
          uri: ${GATEWAY_MEETING_URI:http://127.0.0.1:8101}
          predicates:
            - Path=/meeting/**
          filters:
            - StripPrefix=1

        - id: chat
          uri: ${GATEWAY_CHAT_URI:http://127.0.0.1:8096}
          predicates:
            - Path=/chat/**
          filters:
            - StripPrefix=1

        # Task AI: match first — metadata response-timeout in milliseconds (4h) for slow Ollama.
        - id: task-ai
          uri: http://localhost:8091
          order: -1
          predicates:
            - Path=/task/api/tasks/ai/**
          filters:
            - StripPrefix=1
            - SetRequestHeader=X-Internal-Gateway,true
          metadata:
            response-timeout: 14400000
            connect-timeout: 30000

        # Task: direct URL (port 8091)
        - id: task
          uri: http://localhost:8091
          predicates:
            - Path=/task/**
          filters:
            - StripPrefix=1
            - SetRequestHeader=X-Internal-Gateway,true

        # AImodel (local IntelliJ default 8095; use lb://AIMODEL if you prefer Eureka-only)
        - id: aimodel
          uri: http://localhost:8095
          predicates:
            - Path=/aimodel/**
          filters:
            - StripPrefix=1
          metadata:
            response-timeout: 14400000
            connect-timeout: 30000
