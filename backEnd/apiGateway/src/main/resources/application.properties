# Server
server.port=8078

# Application
spring.application.name=apiGateway

# Exclude Spring Cloud auto-configs incompatible with Boot 4 / reactive Gateway (MVC, JPA, or servlet APIs)
spring.autoconfigure.exclude=org.springframework.cloud.autoconfigure.LifecycleMvcEndpointAutoConfiguration,org.springframework.cloud.autoconfigure.RefreshAutoConfiguration,org.springframework.cloud.client.discovery.simple.SimpleDiscoveryClientAutoConfiguration,org.springframework.cloud.client.discovery.simple.reactive.SimpleReactiveDiscoveryClientAutoConfiguration,org.springframework.boot.actuate.autoconfigure.security.reactive.ReactiveManagementWebSecurityAutoConfiguration

# ========== Eureka Client ==========
eureka.client.service-url.defaultZone=http://localhost:8420/eureka
eureka.client.register-with-eureka=true

# ========== Gateway ==========
# Routes are defined in application.yml (lb:// targets resolved via Eureka).

# ========== Security + Keycloak (OAuth2 Resource Server) ==========
# Must match the Keycloak server URL used by keycloak-auth (see KeyCloak/application.properties keycloak.auth-server-url).
# Tokens are issued by Keycloak; the JWT "iss" claim must match this URI exactly or validation fails (401 on /subcontracting/** etc.).
# Default port 8080 = same as keycloak.auth-server-url in KeyCloak. Override with env KEYCLOAK_ISSUER_URI if Keycloak runs elsewhere.
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/smart-freelance}

# ========== Actuator / Monitoring / Prometheus ==========
# In Docker: management.server.port is set to 9090 via MANAGEMENT_SERVER_PORT env var
# (see docker-compose.yml x-java-env) — metrics are served on port 9090, separate
# from the main port, bypassing Spring Security entirely.
# Locally: metrics served on the main service port.
management.endpoints.web.exposure.include=health,info,prometheus,metrics,env,loggers,refresh
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
