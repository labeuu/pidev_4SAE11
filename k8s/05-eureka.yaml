apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka
  namespace: smart-freelance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka
  template:
    metadata:
      labels:
        app: eureka
    spec:
      containers:
        - name: eureka
          image: YOUR_DOCKERHUB_USERNAME/eureka:latest   # replace with your image
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8420
          env:
            - name: SERVER_PORT
              value: "8420"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8420
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8420
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: eureka
  namespace: smart-freelance
spec:
  selector:
    app: eureka
  ports:
    - port: 8420
      targetPort: 8420
  type: ClusterIP
