apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: smart-freelance
spec:
  replicas: 2    # 2 replicas for HA
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: YOUR_DOCKERHUB_USERNAME/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8078
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: SERVER_PORT
              value: "8078"
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8078
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8078
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: smart-freelance
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8078
      targetPort: 8078
  type: ClusterIP
