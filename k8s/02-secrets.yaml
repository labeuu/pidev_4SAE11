###############################################################################
# IMPORTANT: Replace base64 values before applying to any real cluster.
# Generate:  echo -n 'your-value' | base64
#
# For production use SealedSecrets, Vault, or a managed secrets backend instead.
###############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: smart-freelance
type: Opaque
data:
  # rootpassword (base64)
  MYSQL_ROOT_PASSWORD: cm9vdHBhc3N3b3Jk
  SPRING_DATASOURCE_USERNAME: cm9vdA==      # root
  SPRING_DATASOURCE_PASSWORD: cm9vdHBhc3N3b3Jk

---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: smart-freelance
type: Opaque
data:
  KEYCLOAK_ADMIN: YWRtaW4=                  # admin
  KEYCLOAK_ADMIN_PASSWORD: YWRtaW4=         # admin  ← change for prod
  KEYCLOAK_ADMIN_CLIENT_SECRET: c21hcnQtZnJlZWxhbmNlLWludGVybmFsLXNlY3JldA==

---
apiVersion: v1
kind: Secret
metadata:
  name: mail-secret
  namespace: smart-freelance
type: Opaque
data:
  SPRING_MAIL_USERNAME: ""   # base64 of your SMTP username
  SPRING_MAIL_PASSWORD: ""   # base64 of your SMTP password

---
apiVersion: v1
kind: Secret
metadata:
  name: external-api-secret
  namespace: smart-freelance
type: Opaque
data:
  GITHUB_TOKEN: ""   # base64 of your GitHub token
  AI_API_KEY: ""     # base64 of your AI API key

---
# Firebase credentials JSON — base64-encode the entire JSON file:
#   base64 < firebase-credentials.json
apiVersion: v1
kind: Secret
metadata:
  name: firebase-secret
  namespace: smart-freelance
type: Opaque
data:
  firebase-credentials.json: ""   # paste base64 here

---
# Google Calendar service account JSON
apiVersion: v1
kind: Secret
metadata:
  name: calendar-secret
  namespace: smart-freelance
type: Opaque
data:
  calendar-service-account.json: ""   # paste base64 here
  meeting-service-account.json: ""    # paste base64 here
