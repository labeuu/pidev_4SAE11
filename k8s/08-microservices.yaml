###############################################################################
# All business microservices — each as a Deployment + Service.
# Replace YOUR_DOCKERHUB_USERNAME with your Docker Hub org.
# Common env (Eureka URL, Keycloak URL, etc.) comes from app-config ConfigMap.
# DB credentials come from mysql-secret.
###############################################################################

# ─── Reusable probe template (used by all Spring Boot services) ─────────────
# readinessProbe: httpGet /actuator/health, initialDelay 45s, period 10s
# livenessProbe:  httpGet /actuator/health, initialDelay 90s, period 20s
# Resource defaults: 150m/256Mi request, 500m/512Mi limit

# ─────────────────────────────── keycloak-auth ──────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak-auth
  namespace: smart-freelance
spec:
  replicas: 1
  selector:
    matchLabels: {app: keycloak-auth}
  template:
    metadata:
      labels: {app: keycloak-auth}
    spec:
      containers:
        - name: keycloak-auth
          image: YOUR_DOCKERHUB_USERNAME/keycloak-auth:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8079}]
          envFrom:
            - configMapRef:  {name: app-config}
            - secretRef:     {name: keycloak-secret}
          env:
            - {name: SERVER_PORT, value: "8079"}
          resources:
            requests: {cpu: 150m, memory: 256Mi}
            limits:   {cpu: 500m, memory: 512Mi}
          readinessProbe:
            httpGet: {path: /actuator/health, port: 8079}
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: {path: /actuator/health, port: 8079}
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-auth
  namespace: smart-freelance
spec:
  selector: {app: keycloak-auth}
  ports: [{port: 8079, targetPort: 8079}]

---
# ─────────────────────────────────── user ───────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: smart-freelance
spec:
  replicas: 1
  selector:
    matchLabels: {app: user}
  template:
    metadata:
      labels: {app: user}
    spec:
      containers:
        - name: user
          image: YOUR_DOCKERHUB_USERNAME/user:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8090}]
          envFrom:
            - configMapRef: {name: app-config}
            - secretRef:    {name: mysql-secret}
          env:
            - {name: SERVER_PORT, value: "8090"}
            - {name: SPRING_DATASOURCE_URL, value: "jdbc:mysql://mysql:3306/userdb"}
          resources:
            requests: {cpu: 150m, memory: 256Mi}
            limits:   {cpu: 500m, memory: 512Mi}
          readinessProbe:
            httpGet: {path: /actuator/health, port: 8090}
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet: {path: /actuator/health, port: 8090}
            initialDelaySeconds: 90
            periodSeconds: 20
          volumeMounts:
            - name: user-uploads
              mountPath: /uploads/avatars
      volumes:
        - name: user-uploads
          persistentVolumeClaim:
            claimName: user-uploads-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: user-uploads-pvc
  namespace: smart-freelance
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: {storage: 5Gi}
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: smart-freelance
spec:
  selector: {app: user}
  ports: [{port: 8090, targetPort: 8090}]

