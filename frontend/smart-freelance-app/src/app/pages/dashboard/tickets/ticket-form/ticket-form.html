<div class="container py-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">{{ editingTicket ? 'Edit ticket' : 'New ticket' }}</h2>
    <a class="btn btn-outline-secondary" routerLink="/dashboard/tickets">Back</a>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

  <div *ngIf="loading" class="text-muted">Loading…</div>

  <form *ngIf="!loading" [formGroup]="form" class="card" (ngSubmit)="save()">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Subject</label>
        <input class="form-control" formControlName="subject" placeholder="Describe your issue briefly" />
        <div class="text-danger small mt-1" *ngIf="form.get('subject')?.touched && form.get('subject')?.invalid">
          Subject is required (max 200 chars).
        </div>
      </div>

      <div class="mb-3" *ngIf="editingTicket">
        <label class="form-label">Priority</label>
        <select class="form-select" formControlName="priority">
          <option [ngValue]="null">Auto</option>
          <option value="LOW">LOW</option>
          <option value="MEDIUM">MEDIUM</option>
          <option value="HIGH">HIGH</option>
        </select>
        <div class="form-text">Priority is auto-assigned on creation; you can override while ticket is OPEN.</div>
      </div>

      <div class="d-flex justify-content-end">
        <button class="btn btn-primary" type="submit" [disabled]="saving || form.disabled">
          {{ editingTicket ? 'Save' : 'Create' }}
        </button>
      </div>
    </div>
  </form>
</div>
