<div class="container py-4" style="max-width:700px">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-bottom py-3">
      <h4 class="fw-bold mb-0"><i class="bi bi-pencil-fill me-2 text-warning"></i>Edit Application</h4>
    </div>
    <div class="card-body p-4">
      <div *ngIf="isLoading" class="text-center py-4"><div class="spinner-border text-primary"></div></div>
      <div *ngIf="loadError" class="alert alert-danger">{{ loadError }}</div>

      <ng-container *ngIf="!isLoading && !loadError">
        <div *ngIf="submitSuccess" class="alert alert-success">Updated! Redirecting...</div>
        <div *ngIf="submitError" class="alert alert-danger">{{ submitError }}</div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Proposal Message *</label>
            <textarea class="form-control" rows="6" formControlName="proposalMessage"></textarea>
            <div *ngIf="f('proposalMessage')?.invalid && f('proposalMessage')?.touched" class="text-danger small mt-1">
              Min 20 characters required.
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Expected Rate</label>
              <input type="number" class="form-control" formControlName="expectedRate" placeholder="500">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Available From</label>
              <input type="date" class="form-control" formControlName="availabilityStart">
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
              <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
              {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
            </button>
            <button type="button" class="btn btn-outline-secondary" routerLink="/dashboard/my-job-applications">
              Cancel
            </button>
          </div>
        </form>
      </ng-container>
    </div>
  </div>
</div>
