<div class="chat-layout">

  <!-- ── Left: Conversation list ── -->
  <aside
    class="chat-sidebar"
    [class.chat-sidebar--hidden]="isMobile && selectedPartnerId !== null"
  >
    <app-conversation-list
      [currentUserId]="currentUserId"
      [selectedPartnerId]="selectedPartnerId"
      (conversationSelected)="onConversationSelect($event)"
    />
  </aside>

  <!-- ── Right: Chat window or empty state ── -->
  <main
    class="chat-main"
    [class.chat-main--hidden]="isMobile && selectedPartnerId === null"
  >
    <ng-container *ngIf="selectedPartnerId !== null; else emptyState">
      <app-chat-window
        [currentUserId]="currentUserId!"
        [partnerId]="selectedPartnerId"
        (back)="onBack()"
      />
    </ng-container>

    <ng-template #emptyState>
      <div class="chat-empty">
        <div class="chat-empty__icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2 class="chat-empty__title">Your Messages</h2>
        <p class="chat-empty__sub">
          Select a conversation from the left to start chatting
        </p>
      </div>
    </ng-template>
  </main>

</div>
