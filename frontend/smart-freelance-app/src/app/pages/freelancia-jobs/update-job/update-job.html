<div class="container py-4" style="max-width:780px">
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-bottom py-3">
      <h4 class="fw-bold mb-0"><i class="bi bi-pencil-fill me-2 text-primary"></i>Edit Job</h4>
    </div>
    <div class="card-body p-4">
      <div *ngIf="isLoading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <div *ngIf="loadError" class="alert alert-danger">{{ loadError }}</div>

      <ng-container *ngIf="!isLoading && !loadError">
        <div *ngIf="submitSuccess" class="alert alert-success">Updated! Redirecting...</div>
        <div *ngIf="submitError" class="alert alert-danger">{{ submitError }}</div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
          <!-- Client type -->
          <div class="mb-3">
            <label class="form-label fw-semibold">Posting as *</label>
            <div class="d-flex gap-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" formControlName="clientType" value="INDIVIDUAL" id="typeInd">
                <label class="form-check-label" for="typeInd">Individual</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" formControlName="clientType" value="COMPANY" id="typeCo">
                <label class="form-check-label" for="typeCo">Company</label>
              </div>
            </div>
          </div>
          <div class="mb-3" *ngIf="isCompany">
            <label class="form-label fw-semibold">Company Name *</label>
            <input type="text" class="form-control" formControlName="companyName">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Job Title *</label>
            <input type="text" class="form-control" formControlName="title">
            <div *ngIf="f('title')?.invalid && f('title')?.touched" class="text-danger small mt-1">Title required (min 3 chars).</div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description *</label>
            <textarea class="form-control" rows="5" formControlName="description"></textarea>
            <div *ngIf="f('description')?.invalid && f('description')?.touched" class="text-danger small mt-1">Description required (min 10 chars).</div>
          </div>
          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Budget Min</label>
              <input type="number" class="form-control" formControlName="budgetMin">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Budget Max</label>
              <input type="number" class="form-control" formControlName="budgetMax">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Currency</label>
              <select class="form-select" formControlName="currency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="TND">TND</option>
                <option value="GBP">GBP</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Deadline</label>
            <input type="date" class="form-control" formControlName="deadline" [min]="minDate">
          </div>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category *</label>
              <select class="form-select" formControlName="category">
                <option value="">Select…</option>
                <option *ngFor="let cat of CATEGORIES" [value]="cat">{{ cat }}</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Location Type *</label>
              <select class="form-select" formControlName="locationType">
                <option value="REMOTE">Remote</option>
                <option value="ONSITE">On-site</option>
                <option value="HYBRID">Hybrid</option>
              </select>
            </div>
          </div>
          <div class="mb-4" *ngIf="allSkills.length > 0">
            <label class="form-label fw-semibold">Required Skills</label>
            <div class="d-flex flex-wrap gap-2">
              <button type="button" *ngFor="let skill of allSkills"
                      class="btn btn-sm"
                      [class.btn-primary]="isSkillSelected(skill.id!)"
                      [class.btn-outline-secondary]="!isSkillSelected(skill.id!)"
                      (click)="toggleSkill(skill.id!)">
                {{ skill.name }}
              </button>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="isSubmitting">
              <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
              {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
            </button>
            <button type="button" class="btn btn-outline-secondary" routerLink="/dashboard/my-jobs">Cancel</button>
          </div>
        </form>
      </ng-container>
    </div>
  </div>
</div>
