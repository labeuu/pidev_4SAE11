@if (toast.message(); as msg) {
  <div
    class="app-toast"
    [class.app-toast--success]="toast.variant() === 'success'"
    [class.app-toast--error]="toast.variant() === 'error'"
    [class.app-toast--info]="toast.variant() === 'info'"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  >
    <span class="app-toast__icon" aria-hidden="true">
      @switch (toast.variant()) {
        @case ('success') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        }
        @case ('error') {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        }
        @default {
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        }
      }
    </span>
    <p class="app-toast__text">{{ msg }}</p>
    <button type="button" class="app-toast__close" (click)="toast.dismiss()" aria-label="Fermer">×</button>
  </div>
}
